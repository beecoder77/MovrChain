[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
metadata = true
metadata_hash = "none"
use_literal_content = true
fs_permissions = [{ access = "read-write", path = "./" }]

# Monad Testnet
eth-rpc-url = "https://testnet-rpc.monad.xyz"
chain_id = 10143

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet = "https://rpc.monad.xyz"

[etherscan]
# MonadScan testnet via Etherscan API v2.
# IMPORTANT: do NOT put ?chainid= in the URL — forge appends ?module=... and that
# would produce ?chainid=...?module= which Etherscan rejects.
monad = { key = "${ETHERSCAN_API_KEY}", chain = 10143, url = "https://api.etherscan.io/v2/api" }
